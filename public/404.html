<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PZone IPC V2</title>
    <script type="text/javascript">
      // SPA redirect for GitHub Pages - handles React Router client-side routing
      var repo = '/PZone-IPC-V2';
      var l = window.location;
      var path = l.pathname.replace(repo, '');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repo + '/?p=' + encodeURIComponent(path) +
        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
