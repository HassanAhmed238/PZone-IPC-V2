<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="96" ry="96" fill="url(#shine)"/>
  <!-- Bold P letter -->
  <text x="256" y="380" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="360" font-weight="900" fill="white" letter-spacing="-10">P</text>
  <!-- Small document accent lines (bottom-right) -->
  <g transform="translate(340, 120)" opacity="0.5">
    <rect x="0" y="0" width="60" height="4" rx="2" fill="white"/>
    <rect x="0" y="12" width="44" height="4" rx="2" fill="white"/>
    <rect x="0" y="24" width="52" height="4" rx="2" fill="white"/>
  </g>
</svg>
